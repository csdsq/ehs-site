name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: 8.149.139.66
          port: 2222
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/hser.ren
            git fetch origin
            git reset --hard origin/main
            npm install --registry=https://registry.npmjs.org/ --legacy-peer-deps
            node scripts/generate-data-json.js
            npx astro build
            pm2 restart hser-ren
